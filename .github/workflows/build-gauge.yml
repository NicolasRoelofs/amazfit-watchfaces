name: Build Gauge Watchface

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/watchfaces/gauge/**"
      - ".github/workflows/build-gauge.yml"
  pull_request:
    paths:
      - "src/watchfaces/gauge/**"
      - ".github/workflows/build-gauge.yml"

jobs:
  build-gauge:
    name: Build gauge .zab
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/watchfaces/gauge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Zeus CLI
        run: npm install -g @zeppos/zeus-cli

      - name: Show Zeus version
        run: zeus -v

      - name: Build watchface
        run: zeus build

      - name: List build output
        run: |
          pwd
          ls -la
          ls -la dist || true

      - name: Upload Gauge artifact
        uses: actions/upload-artifact@v4
        with:
          name: gauge-zab
          path: src/watchfaces/gauge/dist/**
          if-no-files-found: error
